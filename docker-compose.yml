version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: vue-drizzle-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=./db/data/sqlite.db
      - CLIENT_URL=http://localhost:5173
    volumes:
      # Persist database data
      - ./server/db/data:/app/db/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: vue-drizzle-client
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

